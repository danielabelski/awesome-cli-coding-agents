name: Update star counts

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh stars + re-sort
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update-stars.py

      - name: Bump "Last updated"
        run: |
          today=$(date -u +%Y-%m-%d)
          sed -i "s/\*\*Last updated:\*\* [0-9-]\+/**Last updated:** ${today}/" README.md

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh GitHub star counts"
          git push
